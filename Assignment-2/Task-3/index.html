<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insights & Blogs</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Navbar -->
      <nav class="navbar">
        <!-- Logo -->
        <div class="logo">
          <div class="logo-icon"></div>
          <span>ScaleX</span>
        </div>

        <!-- Nav Links -->
        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Blogs</a></li>
          <li><a href="#">Contact Us</a></li>
        </ul>

        <!-- Button -->
        <button class="nav-btn">Get Started</button>
      </nav>

      <!-- Hero Section -->
      <section class="hero">
        <h1 class="hero-title">Insights & Blogs</h1>

        <!-- Category Buttons -->
        <div class="category-list">
          <button class="category-btn active">All</button>

          <button class="category-btn">Tech</button>

          <button class="category-btn">SaaS</button>

          <button class="category-btn">Marketing</button>
        </div>
      </section>

      <!-- =========================
         Blog Cards Section
        ========================= -->

      <section class="blog-section">
        <div class="blog-container">
          <!-- Card 1 -->
          <div class="blog-card">
            <div class="blog-image">
              <img src="./images/glass.png" alt="Tech Blog" />
            </div>

            <div class="blog-content">
              <span class="blog-tag"> Tech </span>

              <h2 class="blog-title">The Ultimate Guide To SaaS Marketing</h2>

              <p class="blog-date">May 23, 2025</p>
            </div>
          </div>

          <!-- Card 2 -->
          <div class="blog-card">
            <div class="blog-image">
              <img src="./images/chair.png" alt="SaaS Blog" />
            </div>

            <div class="blog-content">
              <span class="blog-tag"> SaaS </span>

              <h2 class="blog-title">5 Key Trends In SaaS Growth For 2025</h2>

              <p class="blog-date">May 23, 2025</p>
            </div>
          </div>

          <!-- Card 3 -->
          <div class="blog-card">
            <div class="blog-image">
              <img src="./images/cat.png" alt="Marketing Blog" />
            </div>

            <div class="blog-content">
              <span class="blog-tag"> Marketing </span>

              <h2 class="blog-title">
                How Data-Driven Strategies Are Important
              </h2>

              <p class="blog-date">May 23, 2025</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
