<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Left Side Box Section</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f5f5;
      }

      /* SECTION */
      .tea-section {
        width: 100%;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
      }

      /* BACKGROUND IMAGE */
      .tea-section img {
        width: 100%;
        height: 120vh;
        object-fit: cover;
        display: block;
        transform: translateY(0);
        transition: transform 0.2s linear;
        will-change: transform;
      }

      /* LEFT BOX */
      .tea-box {
        position: absolute;
        top: 50%;
        left: 3%;
        transform: translateY(-50%);
        width: 430px;
        min-height: 700px;
        background: #f86a05;
        border: 1px solid #222;
        border-radius: 22px;
        padding: 60px 50px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        z-index: 2;
      }

      .tea-box h1 {
        color: #fff;
        font-size: 44px;
        line-height: 1.1;
        font-weight: 300;
      }

      .tea-btn {
        width: 260px;
        height: 62px;
        border-radius: 50px;
        border: 1px solid #222;
        background: #e9e9e9;
        font-size: 28px;
        cursor: pointer;
        transition: 0.3s;
      }

      .tea-btn:hover {
        background-color: black;
        color: white;
      }

      /* =========================
     LAPTOP
  ========================= */

      @media (max-width: 1200px) {
        .tea-box {
          width: 380px;
          min-height: 620px;
          padding: 45px 35px;
        }

        .tea-box h1 {
          font-size: 42px;
        }
      }

      /* =========================
     TABLET
  ========================= */

      @media (max-width: 992px) {
        .tea-section img {
          height: 100vh;
        }

        .tea-box {
          width: 340px;
          min-height: 560px;
          padding: 35px 30px;
        }

        .tea-box h1 {
          font-size: 46px;
        }

        .tea-btn {
          width: 200px;
          height: 54px;
          font-size: 24px;
        }
      }

      /* =========================
     MOBILE
  ========================= */

      @media (max-width: 768px) {
        .tea-section {
          min-height: auto;
        }

        .tea-section img {
          width: 100%;
          height: 850px;
          object-fit: cover;
        }

        .tea-box {
          width: 90%;
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%);
          min-height: 500px;
          padding: 35px 25px;
        }

        .tea-box h1 {
          font-size: 42px;
        }

        .tea-btn {
          width: 100%;
          height: 52px;
          font-size: 22px;
        }
      }

      /* =========================
     SMALL MOBILE
  ========================= */

      @media (max-width: 480px) {
        .tea-section img {
          height: 700px;
        }

        .tea-box {
          width: 92%;
          min-height: 420px;
          padding: 25px 20px;
          border-radius: 18px;
        }

        .tea-box h1 {
          font-size: 34px;
          line-height: 1.15;
        }

        .tea-btn {
          width: 100%;
          height: 48px;
          font-size: 18px;
        }
      }
    </style>
  </head>

  <body>
    <section class="tea-section">
      <!-- BACKGROUND IMAGE -->
      <img
        src="./images/imgi_49_Two_Leaves_Tea_Aug_25_Shoot-14x_SQ_1_d549e6bb-f1ad-4b36-a851-05e1af195a31.webp"
        alt="Tea Background"
      />

      <!-- LEFT SIDE BOX -->
      <div class="tea-box">
        <h1>
          Great Tea.<br />
          In Good<br />
          Company.
        </h1>

        <button class="tea-btn">About us</button>
      </div>
    </section>

    <script>
      const teaImage = document.querySelector(".tea-section img");

      window.addEventListener("scroll", () => {
        const scrollValue = window.scrollY;

        /* Smooth Up/Down Animation */
        teaImage.style.transform = `translateY(${scrollValue * 0.05}px)`;
      });
    </script>
  </body>
</html>
