<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="style.css" />

    <head>
      <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
        rel="stylesheet"
      />
    </head>
  </head>
  <body>
    <main>
      <section class="section-1">
        <nav>
          <div class="logo">
            <h1><i class="ri-dashboard-line"></i> Task Dashboard</h1>
          </div>

          <div class="search">
            <i class="ri-search-line"></i>
            <input type="text" id="searchInput" placeholder="Search tasks..." />
          </div>

          <div class="right">
            <!-- Filter -->
            <div class="filter-dropdown">
              <button class="filter-btn">
                <i class="ri-filter-3-line"></i>
                Filter
              </button>

              <div class="filter-menu">
                <p data-filter="all">All Tasks</p>
                <p data-filter="work">Work</p>
                <p data-filter="personal">Personal</p>
                <p data-filter="shopping">Shopping</p>
              </div>
            </div>

            <!-- Settings -->
            <div class="settings-dropdown">
              <button class="settings-btn">
                <i class="ri-settings-3-line"></i>
                Settings
              </button>

              <div class="settings-menu">
                <label>
                  <input type="checkbox" id="storage" checked />
                  Local Storage
                </label>

                <button class="clear-all">
                  <i class="ri-delete-bin-line"></i>
                  Clear All
                </button>
              </div>
            </div>

            <!-- Dark Mode Toggle -->
            <button class="theme-toggle-btn" id="darkModeBtn">
              <i class="ri-moon-line"></i>
            </button>
          </div>
        </nav>
      </section>

      <section class="section-2">
        <div class="box">
          <div class="box-text">
            <span>Total Tasks</span>
            <p id="total-count">0</p>
          </div>
          <button class="icon-btn"><i class="ri-list-check"></i></button>
        </div>
        <div class="box">
          <div class="box-text">
            <span>To Do</span>
            <p id="todo-count">0</p>
          </div>
          <button class="icon-btn"><i class="ri-time-line"></i></button>
        </div>
        <div class="box">
          <div class="box-text">
            <span>In Progress</span>
            <p id="progress-count">0</p>
          </div>
          <button class="icon-btn"><i class="ri-loader-4-line"></i></button>
        </div>
        <div class="box">
          <div class="box-text">
            <span>Completed</span>
            <p id="completed-count">0</p>
          </div>
          <button class="icon-btn">
            <i class="ri-checkbox-circle-line"></i>
          </button>
        </div>
      </section>

      <section class="section-addbtn">
        <button class="add-column-btn">
          <i class="ri-add-line"></i>
          Add Task
        </button>
      </section>

      <!-- model -->
      <div class="modal-overlay" id="taskModal">
        <div class="modal-content">
          <div class="modal-header">
            <h3>Create New Task</h3>
            <button class="close-modal" id="closeModal">
              <i class="ri-close-line"></i>
            </button>
          </div>

          <form id="taskForm">
            <div class="form-group">
              <label>Task Title</label>

              <input
                type="text"
                id="taskTitle"
                placeholder="What needs to be done?"
                required
              />
            </div>

            <div class="form-group">
              <label>Category</label>

              <select id="taskCategory" required>
                <option value="work">Work</option>
                <option value="personal">Personal</option>
                <option value="shopping">Shopping</option>
              </select>
            </div>

            <div class="form-group">
              <label>Status</label>

              <select id="taskStatus" required>
                <option value="todo">To Do</option>
                <option value="progress">In Progress</option>
                <option value="completed">Completed</option>
              </select>
            </div>

            <button type="submit" class="create-btn">Create Task</button>
          </form>
        </div>
      </div>

      <section class="section-3">
        <div class="column" id="total-column">
          <div class="column-header">
            <h3>Total</h3>
            <span class="count" id="total-count">0</span>
          </div>
          <div class="tasks-container"></div>
        </div>

        <div class="column" id="todo-column">
          <div class="column-header">
            <h3>To Do</h3>
            <span class="count" id="todo-count">0</span>
          </div>
          <div class="tasks-container"></div>
        </div>

        <div class="column" id="progress-column">
          <div class="column-header">
            <h3>In Progress</h3>
            <span class="count" id="progress-count">0</span>
          </div>
          <div class="tasks-container"></div>
        </div>

        <div class="column" id="completed-column">
          <div class="column-header">
            <h3>Completed</h3>
            <span class="count" id="completed-count">0</span>
          </div>
          <div class="tasks-container"></div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
