<!doctype html>

    <title>Explore Art Work UI</title>
    <link rel="stylesheet" href="style.css" />

    />

              alt="Monocular"
            />
          </div>

            <span class="art-name">Monocular</span>
            <div class="likes-container">
              <span class="likes-count">54.8k</span>
              <span class="heart-icon">♡</span>
            </div>
          </div>
